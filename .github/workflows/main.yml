name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Unzip project
        run: unzip AppAppel3-3.zip
        
      - name: Make gradlew executable
        run: cd AppAppel3 && chmod +x gradlew
        
      - name: Build Debug APK
        run: cd AppAppel3 &&./gradlew assembleDebug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AppAppel-debug
          path: AppAppel3/app/build/outputs/apk/debug/app-debug.apk

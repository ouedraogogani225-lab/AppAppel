name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip
        run: unzip AppAppel3-3.zip
      - name: Build
        run: cd AppAppel3 && chmod +x gradlew && ./gradlew assembleDebug
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: AppAppel3-debug
          path: AppAppel3/app/build/outputs/apk/debug/app-debug.apk

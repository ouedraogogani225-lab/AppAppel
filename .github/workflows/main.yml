name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip
        run: unzip AppAppel.zip
      - name: Build
        run: cd AppAppel && chmod +x gradlew && ./gradlew assembleDebug
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: AppAppel-debug
          path: AppAppel/app/build/outputs/apk/debug/app-debug.apk
